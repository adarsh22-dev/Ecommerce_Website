version: "3.9"

services:
  # ──────────────────────────────────────────
  # Next.js Frontend
  # ──────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecom-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ecom-network

  # ──────────────────────────────────────────
  # .NET 8 Backend API
  # ──────────────────────────────────────────
  api:
    build:
      context: ./EcommerceApi
      dockerfile: Dockerfile
    container_name: ecom-api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=ecommerce;Username=postgres;Password=postgres
      - Jwt__Key=SuperSecretKeyForDevelopment123!
      - Jwt__Issuer=EcommerceApi
      - Jwt__Audience=EcommerceApp
      - Cors__Origin=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ecom-network

  # ──────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecom-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ecom-network

volumes:
  postgres-data:
    driver: local

networks:
  ecom-network:
    driver: bridge
